# ─────────────────────────────────────────────────────────────────────────────
#  ExcelSmartV2 — Build & Deploy (Backend + Frontend)
#  Triggered on push to main. Two parallel jobs.
# ─────────────────────────────────────────────────────────────────────────────
name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true          # kill stale deploys on new push

permissions:
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
#  Backend  — .NET 10 → Azure App Service
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-and-deploy-backend:
    name: "Backend (.NET)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1              # shallow clone — saves time & bandwidth

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore --runtime linux-x64 --verbosity minimal

      - name: Publish (Release)
        run: |
          dotnet publish -c Release \
            --runtime linux-x64 \
            --self-contained false \
            -o ${{ github.workspace }}/publish \
            --no-restore

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: excelsmart-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish

  # ───────────────────────────────────────────────────────────────────────────
  #  Frontend  — React + Vite → Azure Static Web App
  # ───────────────────────────────────────────────────────────────────────────
  build-and-deploy-frontend:
    name: "Frontend (React)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_GEMINI_KEY: ${{ secrets.VITE_GEMINI_KEY }}

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist # The folder containing the pre-built assets
          output_location: ""         # Leave empty when providing pre-built assets via app_location
          skip_app_build: true        # already built above — avoid double-build
          skip_api_build: true
